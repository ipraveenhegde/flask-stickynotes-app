<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sticky Notes</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .notes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .note {
            padding: 15px;
            border-radius: 10px;
            color: #333;
            position: relative;
            min-height: 100px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease-in;
        }

        /* Different sticky colors */
        .note:nth-child(4n+1) { background: #fff9c4; }
        .note:nth-child(4n+2) { background: #c8e6c9; }
        .note:nth-child(4n+3) { background: #bbdefb; }
        .note:nth-child(4n+4) { background: #ffcdd2; }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            text-decoration: none;
        }

        .delete-btn button {
            background: transparent;
            color: #555;
            font-size: 16px;
        }

        .delete-btn button:hover {
            color: red;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>📝 Sticky Notes</header>

<div class="container">

    <form method="POST">
        <input type="text" name="note" placeholder="Write your note..." required>
        <button type="submit">Add</button>
    </form>

    {% if notes %}
        <div class="notes">
            {% for note in notes %}
                <div class="note">
                    {{ note }}
                    <a href="/delete/{{ loop.index0 }}" class="delete-btn">
                        <button>✖</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty">No notes yet. Start adding ✨</div>
    {% endif %}

</div>

</body>
</html>
